name: School La Providence ERP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: testing
  DB_USERNAME: root
  DB_PASSWORD: password

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Audit Composer Dependencies
        run: composer audit --no-dev --format=plain

      - name: Check for Outdated Dependencies
        run: composer outdated --direct --strict || true

  laravel-tests:
    runs-on: ubuntu-latest
    needs: security-audit

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, zip, gd
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Run Tests
        run: php artisan test

      - name: Run Pint (Code Style)
        run: ./vendor/bin/pint --test

  frontend-build:
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint --if-present

      - name: Build Frontend
        run: npm run build

      - name: Check Build Output
        run: ls -la public/build/

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          if-no-files-found: error
          retention-days: 7

  deployment-tests:
    runs-on: ubuntu-latest
    needs: [laravel-tests, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, zip, gd
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Production Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Verify Optimized Build
        run: |
          php artisan config:show app.name
          php artisan route:list --json > /dev/null

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Verify Frontend Assets
        run: |
          ls -la public/build/
          test -f public/build/manifest.json

  deploy-production:
    runs-on: ubuntu-latest
    needs: deployment-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://erp.laprovidence.edu

    steps:
      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: deploy/

      - name: Deploy Frontend Assets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete deploy/ "$SERVER_USER@$SERVER_HOST:/var/www/erp.laprovidence.edu/public/build/"

      - name: Post-Deploy Health Check
        run: curl --fail --silent --show-error https://erp.laprovidence.edu/api/health

  notify:
    runs-on: ubuntu-latest
    needs: [laravel-tests, frontend-build, deployment-tests, deploy-production]
    if: always()

    steps:
      - name: Notify Discord — Success
        if: needs.laravel-tests.result == 'success' && needs.frontend-build.result == 'success'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ✅ **La Providence ERP** — Build réussi !
            - Branche : `${{ github.ref_name }}`
            - Commit : `${{ github.sha }}`
            - Auteur : `${{ github.actor }}`
            - [Voir le run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Discord — Failure
        if: needs.laravel-tests.result == 'failure' || needs.frontend-build.result == 'failure' || needs.deployment-tests.result == 'failure' || needs.deploy-production.result == 'failure'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ❌ **La Providence ERP** — Build échoué !
            - Branche : `${{ github.ref_name }}`
            - Commit : `${{ github.sha }}`
            - Auteur : `${{ github.actor }}`
            - [Voir le run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
